name: Daily Intelligence Report

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST (UTC+5:30)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_report.py

      - name: Commit and push updated report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "ITCI Intelligence Bot"
          git add report.json
          git diff --staged --quiet || git commit -m "Daily report: $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push
